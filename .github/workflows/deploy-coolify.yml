name: Deploy to Coolify

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-coolify-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_API_URL: http://49.13.24.146:8000/api/v1
          COOLIFY_APP_UUID: jkksw80w0c000w04g4ockkg8
        run: |
          set -euo pipefail
          if [ -z "${COOLIFY_API_TOKEN:-}" ]; then
            echo "::error::Falta el secret COOLIFY_API_TOKEN en GitHub Actions."
            exit 1
          fi

          http_code="$(curl -sS -o /tmp/coolify_response.json -w "%{http_code}" -G \
            --connect-timeout 10 \
            --max-time 30 \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Accept: application/json" \
            --data-urlencode "uuid=${COOLIFY_APP_UUID}" \
            "${COOLIFY_API_URL%/}/deploy")"

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Coolify API devolvió HTTP ${http_code}"
            cat /tmp/coolify_response.json || true
            exit 1
          fi

          echo "Deploy solicitado correctamente."
          cat /tmp/coolify_response.json
