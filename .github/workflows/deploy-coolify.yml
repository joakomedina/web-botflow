name: Deploy to Coolify

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-coolify-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_API_URL: http://49.13.24.146:8000/api/v1
          COOLIFY_APP_UUID: jkksw80w0c000w04g4ockkg8
        run: |
          set -euo pipefail
          : "${COOLIFY_API_TOKEN:?Missing COOLIFY_API_TOKEN}"

          curl -fsS -G \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Accept: application/json" \
            --data-urlencode "uuid=${COOLIFY_APP_UUID}" \
            "${COOLIFY_API_URL%/}/deploy"
